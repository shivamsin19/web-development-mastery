<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3 - Media & Tables</title>
</head>
<body>

    <header>
        <h1>HTML Media & Tables</h1>
        <p>Day 3 of Web Development Mastery</p>
    </header>

    <main>

        <!-- MEDIA SECTION -->
        <section>
            <h2>Media Elements</h2>

            <!-- Image -->
            <h3>Image</h3>
            <img src="https://via.placeholder.com/300"
                 alt="Sample Image"
                 width="300">

            <!-- Audio -->
            <h3>Audio</h3>
            <audio controls>
                <source src="sample-audio.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>

            <!-- Video -->
            <h3>Video</h3>
            <video width="320" height="240" controls>
                <source src="sample-video.mp4" type="video/mp4">
                Your browser does not support video.
            </video>

        </section>

        <hr>

        <!-- TABLE SECTION -->
        <section>
            <h2>Student Table</h2>

            <table border="1">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Course</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Shivam</td>
                        <td>25</td>
                        <td>Web Dev</td>
                    </tr>
                    <tr>
                        <td>Rahul</td>
                        <td>23</td>
                        <td>iOS</td>
                    </tr>
                    <tr>
                        <td>Ankit</td>
                        <td>24</td>
                        <td>Android</td>
                    </tr>
                </tbody>
            </table>

        </section>

    </main>

    <footer>
        <p>© 2026 Shivam Sinha</p>
    </footer>

</body>
</html>
